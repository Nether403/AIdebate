name: CI

# Lean CI for the revival workbench: lint, typecheck, and unit tests.
# No deployment. The previous workflow triggered a Render deploy of the retired
# product app, which failed on every push; that has been removed.
# (Build is intentionally omitted here to keep CI self-contained and free of
# provider/env requirements; `npm run build` is part of the local baseline.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, Typecheck, Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
